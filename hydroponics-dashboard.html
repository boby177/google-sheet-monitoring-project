<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hydroponics Monitor</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    :root {
      --green: #2d6a4f;
      --green-light: #52b788;
      --green-pale: #d8f3dc;
      --amber: #e9c46a;
      --red: #e76f51;
      --bg: #f0f7f1;
    }
    body { background: var(--bg); font-family: 'Segoe UI', sans-serif; color: #1b2d22; }
    .navbar { background: var(--green); }
    .navbar-brand { color: #fff !important; font-weight: 600; letter-spacing: 0.5px; }
    .navbar-text { color: rgba(255,255,255,0.7) !important; font-size: 13px; }

    .stat-card { background: #fff; border-radius: 12px; border: none; padding: 1.2rem 1.4rem; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .stat-card .label { font-size: 12px; color: #6c757d; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-card .value { font-size: 28px; font-weight: 600; line-height: 1.2; }
    .stat-card .unit { font-size: 13px; color: #6c757d; }
    .stat-card .icon { font-size: 28px; opacity: 0.15; }

    .chart-card { background: #fff; border-radius: 12px; border: none; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .chart-card .card-header { background: none; border-bottom: 1px solid #f0f0f0; font-weight: 600; font-size: 14px; padding: 1rem 1.25rem 0.75rem; }

    .badge-normal { background: var(--green-pale); color: var(--green); font-weight: 500; }
    .badge-warning { background: #fff3cd; color: #856404; font-weight: 500; }
    .badge-critical { background: #fde8e2; color: #a0341a; font-weight: 500; }

    table thead th { font-size: 12px; text-transform: uppercase; letter-spacing: 0.4px; color: #6c757d; border-bottom: 2px solid #e9ecef; }
    table tbody td { font-size: 14px; vertical-align: middle; }

    .last-updated { font-size: 12px; color: #6c757d; }

    /* ── APPS SCRIPT URL CONFIG ── */
    /* Replace the APPS_SCRIPT_URL value below with your deployed web app URL */
  </style>
</head>
<body>

<nav class="navbar px-4 py-3 mb-4">
  <span class="navbar-brand"><i class="bi bi-flower1 me-2"></i>Hydroponics Monitor</span>
  <span class="navbar-text" id="last-updated">Loading data...</span>
</nav>

<div class="container-fluid px-4">

  <!-- STAT CARDS -->
  <div class="row g-3 mb-4" id="stat-cards">
    <div class="col-6 col-md-3">
      <div class="stat-card d-flex justify-content-between align-items-start">
        <div>
          <div class="label">Avg pH Level</div>
          <div class="value text-success" id="avg-ph">—</div>
          <div class="unit">ideal 5.5–6.5</div>
        </div>
        <i class="bi bi-droplet icon text-success"></i>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="stat-card d-flex justify-content-between align-items-start">
        <div>
          <div class="label">Avg Temp</div>
          <div class="value text-primary" id="avg-temp">—</div>
          <div class="unit">°C</div>
        </div>
        <i class="bi bi-thermometer-half icon text-primary"></i>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="stat-card d-flex justify-content-between align-items-start">
        <div>
          <div class="label">Avg Water</div>
          <div class="value text-info" id="avg-water">—</div>
          <div class="unit">% level</div>
        </div>
        <i class="bi bi-water icon text-info"></i>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="stat-card d-flex justify-content-between align-items-start">
        <div>
          <div class="label">Avg Nutrient</div>
          <div class="value text-warning" id="avg-nutrient">—</div>
          <div class="unit">ppm</div>
        </div>
        <i class="bi bi-flask icon text-warning"></i>
      </div>
    </div>
  </div>

  <!-- CHARTS -->
  <div class="row g-3 mb-4">
    <div class="col-md-6">
      <div class="chart-card card">
        <div class="card-header">pH Level over time</div>
        <div class="card-body"><canvas id="chart-ph" height="180"></canvas></div>
      </div>
    </div>
    <div class="col-md-6">
      <div class="chart-card card">
        <div class="card-header">Temperature (°C)</div>
        <div class="card-body"><canvas id="chart-temp" height="180"></canvas></div>
      </div>
    </div>
    <div class="col-md-6">
      <div class="chart-card card">
        <div class="card-header">Water Level (%)</div>
        <div class="card-body"><canvas id="chart-water" height="180"></canvas></div>
      </div>
    </div>
    <div class="col-md-6">
      <div class="chart-card card">
        <div class="card-header">Nutrient (ppm)</div>
        <div class="card-body"><canvas id="chart-nutrient" height="180"></canvas></div>
      </div>
    </div>
  </div>

  <!-- DATA TABLE -->
  <div class="chart-card card mb-4">
    <div class="card-header d-flex justify-content-between align-items-center">
      <span>All records</span>
      <button class="btn btn-sm btn-outline-success" onclick="loadData()">
        <i class="bi bi-arrow-clockwise me-1"></i>Refresh
      </button>
    </div>
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table mb-0" id="data-table">
          <thead>
            <tr>
              <th class="ps-3">Date</th>
              <th>Plant</th>
              <th>pH</th>
              <th>Temp (°C)</th>
              <th>Water (%)</th>
              <th>Nutrient (ppm)</th>
              <th>Light (hr)</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="table-body">
            <tr><td colspan="8" class="text-center py-4 text-muted">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>

// ============================================================
//  CONFIG — paste your Apps Script URL here after you deploy
// ============================================================
const SHEET_ID = '1zTJqyXbdR1Fnkzw9P6FbFRCUTJrhnxvEhrDKmaOXqmY';
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;

// ============================================================
//  SAMPLE DATA — used when APPS_SCRIPT_URL is not set yet
//  Remove or leave this once you connect your real sheet
// ============================================================
const SAMPLE_DATA = [
  { Date:'2026-06-01', 'Plant Name':'Selada',   'pH Level':6.1, 'Temperature':24, 'Water Level':85, Nutrient:840, Light:12, Status:'Normal'   },
  { Date:'2026-06-02', 'Plant Name':'Selada',   'pH Level':6.3, 'Temperature':25, 'Water Level':80, Nutrient:820, Light:11, Status:'Normal'   },
  { Date:'2026-06-03', 'Plant Name':'Selada',   'pH Level':6.8, 'Temperature':27, 'Water Level':70, Nutrient:780, Light:10, Status:'Warning'  },
  { Date:'2026-06-04', 'Plant Name':'Bayam',    'pH Level':5.9, 'Temperature':23, 'Water Level':90, Nutrient:900, Light:12, Status:'Normal'   },
  { Date:'2026-06-05', 'Plant Name':'Bayam',    'pH Level':6.0, 'Temperature':24, 'Water Level':88, Nutrient:880, Light:13, Status:'Normal'   },
  { Date:'2026-06-06', 'Plant Name':'Bayam',    'pH Level':7.1, 'Temperature':29, 'Water Level':60, Nutrient:720, Light:9,  Status:'Critical' },
  { Date:'2026-06-07', 'Plant Name':'Kangkung', 'pH Level':6.2, 'Temperature':25, 'Water Level':82, Nutrient:850, Light:12, Status:'Normal'   },
  { Date:'2026-06-08', 'Plant Name':'Kangkung', 'pH Level':6.4, 'Temperature':26, 'Water Level':78, Nutrient:810, Light:11, Status:'Normal'   },
];

// ============================================================
//  CHART INSTANCES
// ============================================================
let charts = {};

function makeChart(id, label, color, data, labels) {
  if (charts[id]) charts[id].destroy();
  charts[id] = new Chart(document.getElementById(id), {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label,
        data,
        borderColor: color,
        backgroundColor: color + '22',
        borderWidth: 2,
        pointRadius: 4,
        fill: true,
        tension: 0.3
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { font: { size: 11 } }, grid: { color: '#f0f0f0' } },
        y: { ticks: { font: { size: 11 } }, grid: { color: '#f0f0f0' } }
      }
    }
  });
}

// ============================================================
//  RENDER
// ============================================================
function render(data) {
  const labels = data.map(r => r['Date']);

  makeChart('chart-ph',      'pH Level',      '#2d6a4f', data.map(r => r['pH Level']),    labels);
  makeChart('chart-temp',    'Temperature',   '#3a86ff', data.map(r => r['Temperature']), labels);
  makeChart('chart-water',   'Water Level',   '#0ea5e9', data.map(r => r['Water Level']), labels);
  makeChart('chart-nutrient','Nutrient (ppm)','#e9c46a', data.map(r => r['Nutrient']),    labels);

  const avg = key => (data.reduce((s,r) => s + parseFloat(r[key]||0), 0) / data.length).toFixed(1);
  document.getElementById('avg-ph').textContent      = avg('pH Level');
  document.getElementById('avg-temp').textContent    = avg('Temperature');
  document.getElementById('avg-water').textContent   = avg('Water Level');
  document.getElementById('avg-nutrient').textContent= Math.round(data.reduce((s,r)=>s+parseFloat(r['Nutrient']||0),0)/data.length);

  const tbody = document.getElementById('table-body');
  tbody.innerHTML = data.map(r => {
    const s = r['Status'] || '';
    const badge = s === 'Normal' ? 'badge-normal' : s === 'Warning' ? 'badge-warning' : 'badge-critical';
    return `<tr>
      <td class="ps-3">${r['Date']}</td>
      <td>${r['Plant Name']}</td>
      <td>${r['pH Level']}</td>
      <td>${r['Temperature']}</td>
      <td>${r['Water Level']}</td>
      <td>${r['Nutrient']}</td>
      <td>${r['Light']}</td>
      <td><span class="badge ${badge}">${s}</span></td>
    </tr>`;
  }).join('');

  document.getElementById('last-updated').textContent = 'Last updated: ' + new Date().toLocaleTimeString();
}

function parseCSV(csv) {
  const lines = csv.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.replace(/"/g, '').trim());
  return lines.slice(1).map(line => {
    const cols = [];
    let cur = '', inQ = false;
    for (let c of line) {
      if (c === '"') inQ = !inQ;
      else if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else cur += c;
    }
    cols.push(cur.trim());
    const obj = {};
    headers.forEach((h, i) => obj[h] = (cols[i] || '').replace(/"/g, ''));
    return obj;
  });
}

// ============================================================
//  LOAD — fetches from Apps Script or falls back to sample
// ============================================================
async function loadData() {
  try {
    const res = await fetch(SHEET_URL);
    const csv = await res.text();
    const data = parseCSV(csv);
    render(data);
  } catch (e) {
    console.error('Failed:', e);
  }
}

loadData();
</script>
</body>
</html>
